thresholds:
  min_designable_positions_for_main_window: 8
  min_his_candidates_for_A_or_B: 2
  max_hard_protected_fraction_for_A_or_B: 0.35
  max_high_risk_fraction_for_A_or_B: 0.35
  min_seed_support_for_stable_contact: 3
  min_cluster_support_for_stable_contact: 1
  min_qualified_structures_for_main_scoring: 15
  min_usable_noncontrol_variant_count: 10000

blockers:
  missing_wet_data:
    applies_when: required_target_wet_files_missing_or_unparseable
    does_not_apply_when: window_has_no_direct_prior
  capacity_failure:
    window_level: grade_cap_C_or_D
    target_level: no_legal_window_has_usable_noncontrol_variant_count_ge_10000

recommendation_status_values:
  - recommended
  - exploratory_only
  - blocked

blocker_type_values:
  - insufficient_AF3_models
  - numbering_failure
  - missing_wet_data
  - schema_error
  - capacity_failure
  - source_policy_violation

wet_prior_values:
  - supportive
  - adverse
  - unknown_or_neutral

evidence_route_values:
  - antigen_contact_plus_CDR_His
  - framework_CDR_control
  - wet_module_extension
  - mixed_mechanism
  - insufficient_evidence

grade_routes:
  A:
    - structure_control_route
    - direct_CDR_His_route
    - wet_module_extension_route
  B:
    - partial_support_with_manageable_risk
  C:
    - insufficient_evidence_or_high_risk
  D:
    - hard_filter_failed_or_unacceptable_risk
