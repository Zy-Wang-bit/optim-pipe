pool_count_policy:
  effective_initial_pool_checkpoint: post_exact_dedup_after_generation_hard_filters
  count_controls_separately: true
  controls_counted_in_final_10k: true

duplicate_policy:
  exact_duplicate: generation_time_merge
  near_duplicate: pool_level_cluster_and_tier3_constraint
  final_unique_sequence_required: true

liability_policy:
  no_new_cys: hard_fail
  canonical_new_nxs_t:
    pattern: "N[^P][ST]"
    action: hard_fail
  allow_intentional_new_nxs_t:
    default: false
    require_manual_approval: true
    allowed_only_for: [control_only]

routes:
  required_primary_generation_routes:
    - His_rule
    - His_plus_rescue
    - ProteinMPNN_seeded_rescue
    - wetlab_informed_expansion
    - structure_or_interface_guided
  route_soft_quota:
    His_rule: 0.24
    His_plus_rescue: 0.26
    ProteinMPNN_seeded_rescue: 0.22
    wetlab_informed_expansion: 0.16
    structure_or_interface_guided: 0.12

