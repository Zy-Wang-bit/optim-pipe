proteinmpnn_integration:
  enabled: true
  output_dir: results/initial_design_generation/p0_mpnn
  roles:
    - score_current_pool
    - constrained_rescue_generation
    - relaxed_counterfactual_generation
  tier_unlock:
    p0_annotation: conditional_go
    tier2_core: false
    tier2_heavy: false
    final_10k_selection: false

  scoring:
    run_on_current_pool: true
    compare_with_parent_under_same_mask: true
    use_global_cutoff: false
    use_route_specific_percentile: true
    use_his_seed_specific_percentile: true
    use_rescue_type_specific_percentile: true
    minimum_fields:
      - mpnn_total_score
      - mpnn_total_score_per_residue
      - mpnn_window_score
      - mpnn_mutated_position_score
      - mpnn_his_seed_score
      - mpnn_rescue_score
      - mpnn_parent_delta
      - mpnn_route_percentile
      - mpnn_his_seed_percentile
      - mpnn_rescue_type_percentile
      - mpnn_score_confidence

  constrained_rescue_generation:
    fixed_his_seed: true
    allowed_positions_source: evidence_ledger
    reject_if_no_rescue_objective: true
    disallowed_global: [C]
    disallow_new_canonical_nxs_t: true
    max_his_count:
      1E62: 2
      sdAb: 2
    max_non_his_rescue_count:
      1E62: 3
      sdAb: 2
    temperatures: [0.1, 0.2, 0.3]
    raw_samples_per_target_initial:
      1E62: 20000-50000
      sdAb: 20000-50000
    retained_unique_legal_target:
      1E62: 5000-15000
      sdAb: 5000-15000

  relaxed_counterfactual_generation:
    enabled: true
    effective_candidates_per_target:
      1E62: 5000-10000
      sdAb: 5000-10000
    temperatures: [0.1, 0.2]
    raw_samples_per_target_by_mode:
      relaxed_MPNN_His_optional: 5000
      relaxed_MPNN_His_seeded: 5000
    his_seeded_top_single_seed_sets_per_target: 4
    modes:
      - relaxed_MPNN_His_optional
      - relaxed_MPNN_His_seeded
    final_10k_allocation_policy:
      pre_tier1: audit_only
      default_fraction: 0.00
      after_p0_positive_support_eligible_range: 0.00-0.03
      after_tier2_independent_support_eligible_range: 0.00-0.05
      recommended_after_tier2_if_competitive: 0.03-0.05
      exceptional_max: 0.08
      no_preallocated_quota: true
      require_manual_unlock: true
    cannot_enter_final_without:
      - pH_mechanism_support
      - neutral_retention_support
      - acceptable_liability
      - acceptable_diversity

  provenance:
    required_fields:
      - mpnn_generation_status
      - mpnn_model_version
      - mpnn_input_backbone_id
      - mpnn_fixed_positions
      - mpnn_designed_positions
      - mpnn_temperature
      - mpnn_sample_id
      - mpnn_random_seed
