paths:
  foldx_bin: "third_party/foldx/foldx"
  pdb_dir: "experiments/1E62/R4/data/pdb_single"  # 仅 AF3-1E62-AeS-1
  wt_dir: "experiments/1E62/R4/data"
  wt_files:
    A: "heavy.fasta"
    B: "light.fasta"
    C: "antigen.fasta"
  mpnn_out_dir: "workspace/1e62_r4/mpnn_outputs"
  his_seed_dir: "workspace/1e62_r4/his_seeds"
  esm_out_dir: "workspace/1e62_r4/esm_scores"
  foldx_dir: "workspace/1e62_r4/foldx"
  results_dir: "workspace/1e62_r4/results"
  mpnn_runner: "third_party/ProteinMPNN/protein_mpnn_run.py"

design:
  chain: "A"              # H-chain
  region: [1, 115]        # 全 H-chain
  max_len: 120            # 放开限制（非酵母验证）

interface:
  ab_chains: ["A", "B"]
  ag_chains: ["C"]
  cutoff: 5.0

his_bias:
  enable: true
  min_his_in_region: 1
  target_positions: []    # 自动扫描
  prefer_sites_topk: 30
  single_scan_aminoacids: ["H"]
  pair_scan_limit: 435    # C(30,2)
  triple_scan_limit: 200

screening:
  keep_top_pct_per_pdb: 0.8   # 放宽至 80%，避免 ESM 系统性惩罚 His 密集设计
  min_len: 110
  max_len: 130

esm:
  device: "cuda"
  batch_size: 128

foldx:
  ph_points: [7.4, 6.0]
  number_of_runs: 1
  analyse_groups: "A,B;C"

resources:
  mpnn_chunk_size: 50000
  esm_chunk_size: 50000
  foldx_chunk_size: 800
  foldx_max_procs: 24
  omp_threads: 1
  checkpoint_every: 2000

selection:
  mode: adaptive
  target_n: 10000
  start:        { dG74_max: -3.0,  delta_min: 1.0 }
  relax_step:   { dG74_max:  0.5,  delta_min: -0.25 }
  floors:       { dG74_max:  1.0,  delta_min: 0.0 }
  per_pdb_max_frac: 0.40
  his_min_frac: 0.20
  his_bonus: 0.2
  alpha: 0.3
  beta: 0.1
  delta_delta_weight: 0.0

# ── Tier 1 ──────────────────────────────────────────────────────────────────
tier1:
  enabled: true
  output: "workspace/1e62_r4/results/tier1_candidates.csv"
  adaptive:
    target_range: [200, 400]
    start:      { dG74_max: -3.0, delta_min: 0.3 }
    relax_step: { dG74_max:  0.5, delta_min: -0.15 }
    floors:     { dG74_max:  0.3, delta_min: 0.0 }
  esm:
    flag_below_percentile: 5

# ── Tier 2 ──────────────────────────────────────────────────────────────────
tier2:
  enabled: true

  paths:
    wt_pdb: "experiments/1E62/R4/data/pdb/ab_wt.pdb"
    wt_ab_pdb: "experiments/1E62/R4/data/pdb/ab_wt.pdb"
    template_pdb: "experiments/1E62/R4/data/pdb/AF3-1E62-AeS-1.pdb"
    tier2_dir: "workspace/1e62_r4/tier2"

  input:
    csv: "workspace/1e62_r4/results/tier1_candidates.csv"
    mutations_column: "mutations"
    mutations_format: "foldx"

  chains:
    binder: ["A", "B"]
    target: ["C"]
    heavy: "A"
    light: "B"

  rosetta:
    repack_shell: 8.0
    minimize: true
    scorefxn: "ref2015"

  simplefold:
    model: "simplefold_3B"
    num_steps: 500
    nsample_per_protein: 3
    tau: 0.01
    outlier_global_rmsd: 2.0

  pka:
    tools: ["propka", "pkai+"]
    his_positions:
      # H-chain CDR1 区 His 候选
      - { chain: "A", resid: 26 }
      - { chain: "A", resid: 27 }
      - { chain: "A", resid: 28 }
      - { chain: "A", resid: 29 }
      - { chain: "A", resid: 30 }
      - { chain: "A", resid: 31 }
      - { chain: "A", resid: 32 }
      - { chain: "A", resid: 33 }
      - { chain: "A", resid: 35 }
      # H-chain CDR2 区 His 候选
      - { chain: "A", resid: 50 }
      - { chain: "A", resid: 51 }
      - { chain: "A", resid: 52 }
      - { chain: "A", resid: 54 }
      - { chain: "A", resid: 56 }
      - { chain: "A", resid: 57 }
      - { chain: "A", resid: 58 }
      # H-chain CDR3 区 His 候选
      - { chain: "A", resid: 95 }
      - { chain: "A", resid: 96 }
      - { chain: "A", resid: 97 }
      - { chain: "A", resid: 98 }
      - { chain: "A", resid: 99 }
      - { chain: "A", resid: 100 }
      - { chain: "A", resid: 101 }
      - { chain: "A", resid: 102 }

  cdr_regions:
    H1: { chain: "A", start: 26, end: 35 }
    H2: { chain: "A", start: 50, end: 65 }
    H3: { chain: "A", start: 95, end: 102 }
    L1: { chain: "B", start: 24, end: 34 }
    L2: { chain: "B", start: 50, end: 56 }
    L3: { chain: "B", start: 89, end: 97 }

  filter:
    pka_relative: true
    pka_top_n: 100
    cdr_rmsd_max: 0.5
    cdr_rmsd_metric: "h1_rmsd"
    output: "workspace/1e62_r4/results/tier2_candidates.csv"

# ── Tier 3 ──────────────────────────────────────────────────────────────────
tier3:
  rank_by: "dddG_elec"
  rank_ascending: false
  soft_flags:
    esm_flag: true
    phscore_flag: true
    consensus_flag: true
  output: "workspace/1e62_r4/results/final_candidates.csv"
