design:
  chain: A
  max_len: 120
  region:
  - 1
  - 115
esm:
  batch_size: 128
  device: cuda
foldx:
  analyse_groups: A,B;C
  number_of_runs: 1
  ph_points:
  - 7.4
  - 6.0
his_bias:
  enable: true
  min_his_in_region: 1
  pair_scan_limit: 435
  prefer_sites_topk: 30
  single_scan_aminoacids:
  - H
  target_positions: []
  triple_scan_limit: 200
interface:
  ab_chains:
  - A
  - B
  ag_chains:
  - C
  cutoff: 5.0
paths:
  esm_out_dir: workspace/1e62_r4/esm_scores
  foldx_bin: third_party/foldx/foldx
  foldx_dir: workspace/1e62_r4/foldx
  his_seed_dir: workspace/1e62_r4/his_seeds
  mpnn_out_dir: workspace/1e62_r4/mpnn_outputs
  mpnn_runner: third_party/ProteinMPNN/protein_mpnn_run.py
  pdb_dir: experiments/1E62/R4/data/pdb_single
  results_dir: workspace/1e62_r4/results
  wt_dir: experiments/1E62/R4/data
  wt_files:
    A: heavy.fasta
    B: light.fasta
    C: antigen.fasta
resources:
  checkpoint_every: 2000
  esm_chunk_size: 50000
  foldx_chunk_size: 200
  foldx_max_procs: 128
  mpnn_chunk_size: 50000
  omp_threads: 1
screening:
  keep_top_pct_per_pdb: 0.8
  max_len: 130
  min_len: 110
selection:
  alpha: 0.3
  beta: 0.1
  delta_delta_weight: 0.0
  floors:
    dG74_max: 1.0
    delta_min: 0.0
  his_bonus: 0.2
  his_min_frac: 0.2
  mode: adaptive
  per_pdb_max_frac: 0.4
  relax_step:
    dG74_max: 0.5
    delta_min: -0.25
  start:
    dG74_max: -3.0
    delta_min: 1.0
  target_n: 10000
tier1:
  adaptive:
    floors:
      dG74_max: 0.3
      delta_min: 0.0
    relax_step:
      dG74_max: 0.5
      delta_min: -0.15
    start:
      dG74_max: -3.0
      delta_min: 0.3
    target_range:
    - 200
    - 400
  enabled: true
  esm:
    flag_below_percentile: 5
  output: workspace/1e62_r4/results/tier1_candidates.csv
tier2:
  cdr_regions:
    H1:
      chain: A
      end: 35
      start: 26
    H2:
      chain: A
      end: 65
      start: 50
    H3:
      chain: A
      end: 102
      start: 95
    L1:
      chain: B
      end: 34
      start: 24
    L2:
      chain: B
      end: 56
      start: 50
    L3:
      chain: B
      end: 97
      start: 89
  chains:
    binder:
    - A
    - B
    heavy: A
    light: B
    target:
    - C
  enabled: true
  filter:
    cdr_rmsd_max: 0.5
    cdr_rmsd_metric: h1_rmsd
    output: workspace/1e62_r4/results/tier2_candidates.csv
    pka_relative: true
    pka_top_n: 100
  input:
    csv: workspace/1e62_r4/results/tier1_candidates.csv
    mutations_column: mutations
    mutations_format: foldx
  paths:
    template_pdb: experiments/1E62/R4/data/pdb/AF3-1E62-AeS-1.pdb
    tier2_dir: workspace/1e62_r4/tier2
    wt_ab_pdb: experiments/1E62/R4/data/pdb/ab_wt.pdb
    wt_pdb: experiments/1E62/R4/data/pdb/ab_wt.pdb
  pka:
    his_positions:
    - chain: A
      resid: 26
    - chain: A
      resid: 27
    - chain: A
      resid: 28
    - chain: A
      resid: 29
    - chain: A
      resid: 30
    - chain: A
      resid: 31
    - chain: A
      resid: 32
    - chain: A
      resid: 33
    - chain: A
      resid: 35
    - chain: A
      resid: 50
    - chain: A
      resid: 51
    - chain: A
      resid: 52
    - chain: A
      resid: 54
    - chain: A
      resid: 56
    - chain: A
      resid: 57
    - chain: A
      resid: 58
    - chain: A
      resid: 95
    - chain: A
      resid: 96
    - chain: A
      resid: 97
    - chain: A
      resid: 98
    - chain: A
      resid: 99
    - chain: A
      resid: 100
    - chain: A
      resid: 101
    - chain: A
      resid: 102
    tools:
    - propka
    - pkai+
  rosetta:
    minimize: true
    repack_shell: 8.0
    scorefxn: ref2015
  simplefold:
    model: simplefold_3B
    nsample_per_protein: 3
    num_steps: 500
    outlier_global_rmsd: 2.0
    tau: 0.01
tier3:
  output: workspace/1e62_r4/results/final_candidates.csv
  rank_ascending: false
  rank_by: dddG_elec
  soft_flags:
    consensus_flag: true
    esm_flag: true
    phscore_flag: true
