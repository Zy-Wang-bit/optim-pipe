paths:
  # foldx_bin: "foldx"
  foldx_bin: "third_party/foldx/foldx"
  pdb_dir: "experiments/1E62/data/pdb"
  wt_dir: "experiments/1E62/data"
  wt_files:
    A: "heavy.fasta"     # 重链 WT
    B: "light.fasta"     # 轻链 WT
    C: "antigen.fasta"        # 抗原 WT
  mpnn_out_dir: "mpnn_outputs"
  his_seed_dir: "his_seeds"
  esm_out_dir: "esm_scores"
  foldx_dir: "foldx"
  results_dir: "results"
  mpnn_runner: "ProteinMPNN/protein_mpnn_run.py"

design:
  chain: "A"          # A/B
  region: [76, 115]    # 连续窗口（含端点），≤40
  max_len: 40

interface:
  ab_chains: ["A","B"]
  ag_chains: ["C"]
  cutoff: 5.0

his_bias:
  enable: true
  min_his_in_region: 1           # 至少含1个H
  target_positions: []           # 接口热点位点列表（留空则自动扫描）
  prefer_sites_topk: 20          # 自动扫描时取前20个热点
  single_scan_aminoacids: ["H"]  # S1：单点改为H
  pair_scan_limit: 1000          # S2：成对His组合上限（控量）

screening:
  keep_top_pct_per_pdb: 0.5      # ESM初筛保留比例（10% 示例）
  min_len: 110                   # （按需）最小序列长度约束
  max_len: 130                   # （按需）最大序列长度约束

esm:
  device: "cuda"                 # "cpu"/"cuda"
  batch_size: 128

foldx:
  ph_points: [7.4, 6.0]          # 仅两点
  number_of_runs: 1              # 可设为>1提升稳健性
  analyse_groups: "A,B;C"        # 例：抗体(H,L) 对 抗原(A)

resources:
  mpnn_chunk_size: 50000         # 每批序列规模（按资源改）
  esm_chunk_size: 50000
  foldx_chunk_size: 800
  foldx_max_procs: 24            # 并发子进程数（≈物理核）
  omp_threads: 1                 # 每进程OMP线程数（固定1）
  checkpoint_every: 2000        # 每处理N条落盘一次

selection:
  mode: adaptive
  target_n: 10000
  start:        { dG74_max: -3.0,  delta_min: 1.0 }
  relax_step:   { dG74_max:  0.5,  delta_min: -0.25 }
  floors:       { dG74_max:  1.0,  delta_min: 0.0 }
  # 可选：连带限制 ΔΔΔG（有就用，没有就忽略）
  # delta_delta_start: 0.5
  # delta_delta_step:  -0.2
  # delta_delta_floor: 0.0
  per_pdb_max_frac: 0.40   # 单PDB最多占比
  his_min_frac: 0.20       # 保底 his 候选占比
  his_bonus: 0.2
  alpha: 0.3
  beta: 0.1
  delta_delta_weight: 0.0

# ── Tier 1: 高通量筛选（Step 8）─────────────────────────────────────────────
tier1:
  enabled: true                          # false 时沿用旧 merge_and_select.py
  output: "results/tier1_candidates.csv"
  adaptive:
    target_range: [300, 500]             # 自适应目标候选数范围
    start:      { dG74_max: -3.0, delta_min: 0.5 }
    relax_step: { dG74_max:  0.5, delta_min: -0.25 }
    floors:     { dG74_max:  1.0, delta_min: 0.0 }
  esm:
    flag_below_percentile: 5             # ESM 低于第 5 百分位标记为异常

# ── Tier 2: 结构评估 + 筛选（Steps 9-12）───────────────────────────────────
tier2:
  enabled: false                         # 设为 true 启用 Tier 2-3

  paths:
    wt_pdb: "experiments/1E62/data/pdb/ab_wt.pdb"
    wt_ab_pdb: "experiments/1E62/data/pdb/ab_wt.pdb"         # 单抗体 WT（SimpleFold RMSD 用）
    template_pdb: "experiments/1E62/data/pdb/AF3-1E62-AeS-1.pdb"  # 复合物模板（PyRosetta 用）
    tier2_dir: "tier2"                   # Tier 2 所有输出的根目录

  input:
    csv: "results/tier1_candidates.csv"  # Tier 2 输入（Tier 1 输出）
    mutations_column: "mutations"
    mutations_format: "foldx"            # "foldx" (FA102H) 或 "unified" (HF102H)

  chains:
    binder: ["A", "B"]
    target: ["C"]
    heavy: "A"
    light: "B"

  # PyRosetta 线
  rosetta:
    repack_shell: 8.0
    minimize: true
    scorefxn: "ref2015"

  # SimpleFold 3x 线
  simplefold:
    model: "simplefold_3B"
    num_steps: 500
    nsample_per_protein: 3
    tau: 0.01
    outlier_global_rmsd: 2.0             # 全局 RMSD > 此值视为 VH-VL 朝向异常

  pka:
    tools: ["propka", "pkai+"]
    his_positions:
      - { chain: "B", resid: 42 }
      - { chain: "B", resid: 43 }
      - { chain: "B", resid: 44 }

  cdr_regions:
    H1: { chain: "A", start: 26, end: 35 }
    H2: { chain: "A", start: 50, end: 65 }
    H3: { chain: "A", start: 95, end: 102 }
    L1: { chain: "B", start: 24, end: 34 }
    L2: { chain: "B", start: 50, end: 56 }
    L3: { chain: "B", start: 89, end: 97 }

  filter:
    pka_relative: true                   # 按 pKa 相对于 WT 排序（非绝对阈值）
    pka_top_n: 200                       # pKa 排序后取 top-N
    cdr_rmsd_max: 0.5                    # CDR RMSD 硬门槛 (Å)
    cdr_rmsd_metric: "h1_rmsd"           # 使用哪个 CDR RMSD（默认 H1）
    output: "results/tier2_candidates.csv"

# ── Tier 3: 精排（Step 13）─────────────────────────────────────────────────
tier3:
  rank_by: "dddG_elec"                  # 排序指标
  rank_ascending: false                  # false = 降序（dddG_elec 越大越好）
  soft_flags:
    esm_flag: true                       # 标记 ESM 异常
    phscore_flag: true                   # 标记 pH-score 异常
    consensus_flag: true                 # 标记 pKa consensus != "agree"
  output: "results/final_candidates.csv"

# ── 旧模式 Phase C（向后兼容，tier1.enabled: false 时使用）─────────────────
phase_c:
  enabled: false
  max_candidates: 500

  paths:
    wt_pdb: "experiments/1E62/data/pdb/ab_wt.pdb"
    template_pdb: "experiments/1E62/data/pdb/AF3-1E62-AeS-1.pdb"
    phase_c_dir: "phase_c"

  input:
    csv: "results/final_top10k.csv"
    mutations_column: "mutations"
    mutations_format: "foldx"

  chains:
    binder: ["A", "B"]
    target: ["C"]
    heavy: "A"
    light: "B"

  structure_generation:
    primary: "rosetta"
    auxiliary: null
    rosetta:
      repack_shell: 8.0
      minimize: true
      scorefxn: "ref2015"
    simplefold:
      model: "simplefold_3B"
      num_steps: 500
      nsample_per_protein: 3
      tau: 0.01

  pka:
    tools: ["propka", "pkai+"]
    his_positions:
      - { chain: "B", resid: 42 }
      - { chain: "B", resid: 43 }
      - { chain: "B", resid: 44 }

  cdr_regions:
    H1: { chain: "A", start: 26, end: 35 }
    H2: { chain: "A", start: 50, end: 65 }
    H3: { chain: "A", start: 95, end: 102 }
    L1: { chain: "B", start: 24, end: 34 }
    L2: { chain: "B", start: 50, end: 56 }
    L3: { chain: "B", start: 89, end: 97 }