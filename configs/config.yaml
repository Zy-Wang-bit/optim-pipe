paths:
  # foldx_bin: "foldx"
  foldx_bin: "third_party/foldx/foldx"
  pdb_dir: "experiments/1E62/data"
  wt_dir: "experiments/1E62/data"
  wt_files:
    A: "heavy.fasta"     # 重链 WT
    B: "light.fasta"     # 轻链 WT
    C: "antigen.fasta"        # 抗原 WT
  mpnn_out_dir: "mpnn_outputs"
  his_seed_dir: "his_seeds"
  esm_out_dir: "esm_scores"
  foldx_dir: "foldx"
  results_dir: "results"
  mpnn_runner: "ProteinMPNN/protein_mpnn_run.py"

design:
  chain: "A"          # A/B
  region: [76, 115]    # 连续窗口（含端点），≤40
  max_len: 40

interface:
  ab_chains: ["A","B"]
  ag_chains: ["C"]
  cutoff: 5.0

his_bias:
  enable: true
  min_his_in_region: 1           # 至少含1个H
  target_positions: []           # 接口热点位点列表（留空则自动扫描）
  prefer_sites_topk: 20          # 自动扫描时取前20个热点
  single_scan_aminoacids: ["H"]  # S1：单点改为H
  pair_scan_limit: 1000          # S2：成对His组合上限（控量）

screening:
  keep_top_pct_per_pdb: 0.5      # ESM初筛保留比例（10% 示例）
  min_len: 110                   # （按需）最小序列长度约束
  max_len: 130                   # （按需）最大序列长度约束

esm:
  device: "cuda"                 # "cpu"/"cuda"
  batch_size: 128

foldx:
  ph_points: [7.4, 6.0]          # 仅两点
  number_of_runs: 1              # 可设为>1提升稳健性
  analyse_groups: "A,B;C"        # 例：抗体(H,L) 对 抗原(A)

resources:
  mpnn_chunk_size: 50000         # 每批序列规模（按资源改）
  esm_chunk_size: 50000
  foldx_chunk_size: 800
  foldx_max_procs: 24            # 并发子进程数（≈物理核）
  omp_threads: 1                 # 每进程OMP线程数（固定1）
  checkpoint_every: 2000        # 每处理N条落盘一次

selection:
  mode: adaptive
  target_n: 10000
  start:        { dG74_max: -3.0,  delta_min: 1.0 }
  relax_step:   { dG74_max:  0.5,  delta_min: -0.25 }
  floors:       { dG74_max:  1.0,  delta_min: 0.0 }
  # 可选：连带限制 ΔΔΔG（有就用，没有就忽略）
  # delta_delta_start: 0.5
  # delta_delta_step:  -0.2
  # delta_delta_floor: 0.0
  per_pdb_max_frac: 0.40   # 单PDB最多占比
  his_min_frac: 0.20       # 保底 his 候选占比
  his_bonus: 0.2
  alpha: 0.3
  beta: 0.1
  delta_delta_weight: 0.0

# ── Phase C: 多维度评估（可选）──────────────────────────────────────────────
phase_c:
  enabled: false                     # 设为 true 启用 Steps 8-11

  paths:
    wt_pdb: "experiments/1E62/data/ab_wt.pdb"
    template_pdb: "experiments/1E62/data/AF3-abag-n1.pdb"
    phase_c_dir: "phase_c"           # Phase C 所有输出的根目录

  input:
    csv: "results/final_top10k.csv"  # Phase C 候选列表（默认为 Step 7 后的合并结果）
    mutations_column: "mutations"
    mutations_format: "foldx"        # "foldx" (FA102H) 或 "unified" (HF102H)

  chains:
    binder: ["A", "B"]
    target: ["C"]
    heavy: "A"
    light: "B"

  structure_generation:
    primary: "rosetta"               # "rosetta" 或 "simplefold"
    auxiliary: null                   # 辅助方法（如 "simplefold"），null 则不启用
    rosetta:
      repack_shell: 8.0
      minimize: true
      scorefxn: "ref2015"
    simplefold:
      model: "simplefold_3B"
      num_steps: 500
      nsample_per_protein: 3
      tau: 0.01

  pka:
    tools: ["propka", "pkai+"]
    his_positions:
      - { chain: "B", resid: 42 }
      - { chain: "B", resid: 43 }
      - { chain: "B", resid: 44 }

  cdr_regions:
    H1: { chain: "A", start: 26, end: 35 }
    H2: { chain: "A", start: 50, end: 65 }
    H3: { chain: "A", start: 95, end: 102 }
    L1: { chain: "B", start: 24, end: 34 }
    L2: { chain: "B", start: 50, end: 56 }
    L3: { chain: "B", start: 89, end: 97 }