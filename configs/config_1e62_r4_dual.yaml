paths:
  foldx_bin: "third_party/foldx/foldx"
  pdb_dir: "experiments/1E62/R4/data/pdb_single"  # AF3-1E62-AeS-1
  wt_dir: "experiments/1E62/R4/data"
  wt_files:
    A: "heavy.fasta"
    B: "light.fasta"
    C: "antigen.fasta"
  mpnn_out_dir: "workspace/1e62_r4_dual/mpnn_outputs"
  his_seed_dir: "workspace/1e62_r4_dual/his_seeds"
  esm_out_dir: "workspace/1e62_r4_dual/esm_scores"
  foldx_dir: "workspace/1e62_r4_dual/foldx"
  results_dir: "workspace/1e62_r4_dual/results"
  mpnn_runner: "third_party/ProteinMPNN/protein_mpnn_run.py"

design:
  chain: ["A", "B"]        # 双链同时设计
  regions:
    A: [1, 115]             # H-chain 全链
    B: [1, 113]             # L-chain 全链
  max_len: 230              # 115 + 113

interface:
  ab_chains: ["A", "B"]
  ag_chains: ["C"]
  cutoff: 5.0

his_bias:
  enable: true
  min_his_in_region: 1
  target_positions:          # 手动指定 + 自动扫描补充
    # H-chain (R1 KD_ratio 验证 + 界面 hotspot)
    - "A:31"    # CDR1 hotspot
    - "A:32"    # CDR1 hotspot
    - "A:33"    # CDR1 hotspot
    - "A:50"    # HE50H, KD_ratio=1.45
    - "A:51"    # HV51H, KD_ratio=1.83
    - "A:52"    # HK52H, KD_ratio=2.64 (R1 最佳 H 位点)
    - "A:28"    # CDR1, 对应 LS28H=1.82
    - "A:101"   # CDR3 hotspot
    - "A:102"   # CDR3 hotspot
    - "A:103"   # CDR3 hotspot
    # L-chain (R1 KD_ratio + R2 SAR 验证)
    - "B:26"    # LS26H, KD_ratio=2.87 (R1 总排名第一)
    - "B:31"    # LY31H, KD_ratio=1.71
    - "B:35"    # LQ35H, KD_ratio=1.71
    - "B:38"    # LY38H, KD_ratio=1.73
    - "B:42"    # com18 核心 (S42H)
    - "B:43"    # com18 核心 (Q43H)
    - "B:44"    # com18 核心 (Q44H)
    - "B:58"    # LS58H, KD_ratio=1.63
    - "B:96"    # CDR3 hotspot
    - "B:97"    # CDR3 hotspot
  prefer_sites_topk: 15     # 自动扫描补充（与手动指定合并去重）
  single_scan_aminoacids: ["H"]
  pair_scan_limit: 500
  triple_scan_limit: 300
  quad_scan_limit: 0

screening:
  keep_top_pct_per_pdb: 0.5    # 收紧到 50%
  min_len: 200
  max_len: 250

esm:
  device: "cuda"
  batch_size: 64            # 双链序列更长，降低 batch

foldx:
  ph_points: [7.4, 6.0]
  number_of_runs: 1
  analyse_groups: "A,B;C"

resources:
  mpnn_chunk_size: 50000
  esm_chunk_size: 50000
  foldx_chunk_size: 200
  foldx_max_procs: 128
  omp_threads: 1
  checkpoint_every: 2000

selection:
  mode: adaptive
  target_n: 10000
  start:        { dG74_max: -3.0,  delta_min: 1.0 }
  relax_step:   { dG74_max:  0.5,  delta_min: -0.25 }
  floors:       { dG74_max:  1.0,  delta_min: 0.0 }
  per_pdb_max_frac: 1.0
  his_min_frac: 0.20
  his_bonus: 0.2
  alpha: 0.3
  beta: 0.1
  delta_delta_weight: 0.0

tier1:
  enabled: true
  output: "workspace/1e62_r4_dual/results/tier1_candidates.csv"
  adaptive:
    target_range: [200, 400]
    start:      { dG74_max: -3.0, delta_min: 0.3 }
    relax_step: { dG74_max:  0.5, delta_min: -0.15 }
    floors:     { dG74_max:  0.3, delta_min: 0.0 }
  esm:
    flag_below_percentile: 5

tier2:
  enabled: true
  paths:
    wt_pdb: "experiments/1E62/R4/data/pdb/ab_wt.pdb"
    wt_ab_pdb: "experiments/1E62/R4/data/pdb/ab_wt.pdb"
    template_pdb: "experiments/1E62/R4/data/pdb/AF3-1E62-AeS-1.pdb"
    tier2_dir: "workspace/1e62_r4_dual/tier2"
  input:
    csv: "workspace/1e62_r4_dual/results/tier1_candidates.csv"
    mutations_column: "mutations"
    mutations_format: "foldx"
  chains:
    binder: ["A", "B"]
    target: ["C"]
    heavy: "A"
    light: "B"
  rosetta:
    repack_shell: 8.0
    minimize: true
    scorefxn: "ref2015"
  simplefold:
    model: "simplefold_3B"
    num_steps: 500
    nsample_per_protein: 3
    tau: 0.01
    outlier_global_rmsd: 2.0
  pka:
    tools: ["propka", "pkai+"]
    his_positions:
      # H-chain CDR 位点
      - { chain: "A", resid: 27 }
      - { chain: "A", resid: 28 }
      - { chain: "A", resid: 31 }
      - { chain: "A", resid: 32 }
      - { chain: "A", resid: 33 }
      - { chain: "A", resid: 50 }
      - { chain: "A", resid: 52 }
      - { chain: "A", resid: 53 }
      - { chain: "A", resid: 56 }
      - { chain: "A", resid: 101 }
      - { chain: "A", resid: 102 }
      - { chain: "A", resid: 103 }
      # L-chain CDR + FR2 位点
      - { chain: "B", resid: 26 }
      - { chain: "B", resid: 28 }
      - { chain: "B", resid: 31 }
      - { chain: "B", resid: 38 }
      - { chain: "B", resid: 42 }
      - { chain: "B", resid: 43 }
      - { chain: "B", resid: 44 }
      - { chain: "B", resid: 51 }
      - { chain: "B", resid: 58 }
      - { chain: "B", resid: 96 }
      - { chain: "B", resid: 97 }
  cdr_regions:
    H1: { chain: "A", start: 26, end: 35 }
    H2: { chain: "A", start: 50, end: 65 }
    H3: { chain: "A", start: 95, end: 102 }
    L1: { chain: "B", start: 24, end: 34 }
    L2: { chain: "B", start: 50, end: 56 }
    L3: { chain: "B", start: 89, end: 97 }
  filter:
    pka_relative: true
    pka_top_n: 100
    cdr_rmsd_max: 0.5
    cdr_rmsd_metric: "h1_rmsd"
    output: "workspace/1e62_r4_dual/results/tier2_candidates.csv"

tier3:
  rank_by: "dddG_elec"
  rank_ascending: false
  soft_flags:
    esm_flag: true
    phscore_flag: true
    consensus_flag: true
  output: "workspace/1e62_r4_dual/results/final_candidates.csv"
