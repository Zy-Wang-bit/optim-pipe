# 测试用配置 — 极短模拟
md:
  gmx_executable: "/public/apps/gromacs/2024.2/bin/gmx"
  force_field: "amber99sb-ildn"
  water_model: "tip3p"
  box_type: "cubic"
  box_distance: 1.0
  ion_concentration: 0.15
  temperature: 310
  max_warnings: 2

  stages:
    minimization:
      max_steps: 500
      emtol: 1000.0
    nvt:
      duration_ps: 2          # 极短: 2ps
      dt_ps: 0.001
    npt:
      duration_ps: 2          # 极短: 2ps
      dt_ps: 0.001
    production:
      duration_ns: 0.01       # 极短: 10ps
      dt_ps: 0.002
      save_interval_ps: 2

  cphmd:
    enabled: false
    ph_values: [7.4, 6.0]
    titratable_residues: []
    lambda_dynamics:
      calibration_ph: 7.0
      barrier_height: 5.0
      update_nst: 100

  gpu:
    device_id: 0
    ntmpi: 1
    ntomp: 4

  output_dir: "/tmp/md_test"

analysis:
  antibody_chains: ["A", "B"]
  antigen_chains: ["C"]

  cdr_regions:
    H1: { chain: "A", start: 26, end: 35 }
    H2: { chain: "A", start: 50, end: 65 }
    H3: { chain: "A", start: 95, end: 102 }
    L1: { chain: "B", start: 24, end: 34 }
    L2: { chain: "B", start: 50, end: 56 }
    L3: { chain: "B", start: 89, end: 97 }

  convergence:
    window_ns: 0.002
    variance_threshold: 0.5

  contact_distance: 4.5

  mmpbsa:
    enabled: false
    method: "GBSA"
    frame_interval_ps: 100
