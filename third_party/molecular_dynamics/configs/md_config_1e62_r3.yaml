# 1E62 R3 MD 配置 (gpu5 用)

md:
  gmx_executable: "/public/apps/gromacs/2024.2/bin/gmx"
  force_field: "amber99sb-ildn"
  water_model: "tip3p"
  box_type: "dodecahedron"
  box_distance: 1.0
  ion_concentration: 0.15
  temperature: 310
  max_warnings: 2

  stages:
    minimization:
      max_steps: 5000
      emtol: 1000.0
    nvt:
      duration_ps: 200
      dt_ps: 0.001
    npt:
      duration_ps: 1000
      dt_ps: 0.001
    production:
      duration_ns: 50
      dt_ps: 0.002
      save_interval_ps: 100

  cphmd:
    enabled: false

  gpu:
    device_id: 0
    ntmpi: 1
    ntomp: 6

  output_dir: "experiments/1E62/R3/md"

analysis:
  antibody_chains: ["A", "B"]
  antigen_chains: ["C"]

  # GROMACS 连续编号:
  #   H 链 (PDB A): resid 1-115 (offset 0)
  #   L 链 (PDB B): resid 116-228 (offset +115)
  #   抗原 (PDB C): resid 229-454 (offset +228)

  cdr_regions:
    # H 链 CDR: PDB resid = GROMACS resid
    H1: { chain: "A", start: 26, end: 35 }
    H2: { chain: "A", start: 50, end: 65 }
    H3: { chain: "A", start: 95, end: 102 }
    # L 链 CDR: PDB resid + 115 = GROMACS resid
    L1: { chain: "B", start: 139, end: 149 }   # PDB 24-34
    L2: { chain: "B", start: 165, end: 171 }   # PDB 50-56
    L3: { chain: "B", start: 204, end: 212 }   # PDB 89-97

  convergence:
    window_ns: 5.0
    variance_threshold: 0.05

  contact_distance: 4.5

  pairwise_dist:
    # GROMACS 连续编号
    # PDB L:N → resid N+115, PDB C:N → resid N+228
    pairs:
      # L链 His 簇 → 抗原 LYS122 (PDB C:122 = GROMACS 350)
      - { chain1: "B", resid1: 157, chain2: "C", resid2: 350, label: "LHis42-LYS122" }
      - { chain1: "B", resid1: 158, chain2: "C", resid2: 350, label: "LHis43-LYS122" }
      - { chain1: "B", resid1: 159, chain2: "C", resid2: 350, label: "LHis44-LYS122" }
      # 已知关键盐桥: LYS122(抗原) - ASP103(H链)
      - { chain1: "C", resid1: 350, chain2: "A", resid2: 103, label: "LYS122-ASP103" }
      # HIS43(L) - LYS45(H, PDB A:45 = GROMACS 45): His-Lys 排斥机制
      - { chain1: "B", resid1: 158, chain2: "A", resid2: 45, label: "LHis43-Pos45" }

  mmpbsa:
    enabled: false
